<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Makaleler | Av. Emre Altundaş</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --navy: #0F2747;
        --gold: #C8A45D;
        --white: #FFFFFF;
        --light-gray: #F5F5F5;
        --modern-text: #1E293B;
        --font-head: 'Cormorant Garamond', serif;
        --font-body: 'Inter', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); color: var(--modern-text); background: var(--light-gray); }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    header { background: var(--navy); padding: 22px 0; }
    .nav-container { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: var(--font-head); font-size: 1.6rem; color: var(--white); text-decoration: none; font-weight: 600; }
    .logo span { color: var(--gold); }
    header a.back { color: var(--gold); text-decoration: none; font-size: 0.9rem; }
    .page-head { text-align: center; padding: 70px 20px 40px; }
    .page-head h1 { font-family: var(--font-head); font-size: 2.6rem; color: var(--navy); }
    .gold-line { width: 60px; height: 2px; background: var(--gold); margin: 18px auto; }
    .page-head p { color: #64748B; max-width: 500px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding: 20px 0 90px; }
    .card { background: var(--white); overflow: hidden; box-shadow: 0 4px 20px rgba(15,39,71,0.06); display: flex; flex-direction: column; }
    .card img { width: 100%; height: 190px; object-fit: cover; background: var(--light-gray); }
    .card-body { padding: 24px; display: flex; flex-direction: column; flex-grow: 1; }
    .card-date { color: var(--gold); font-size: 0.78rem; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
    .card h3 { font-family: var(--font-head); font-size: 1.4rem; color: var(--navy); margin-bottom: 12px; }
    .card p { color: #64748B; font-size: 0.92rem; line-height: 1.6; flex-grow: 1; }
    .card a.read { margin-top: 18px; color: var(--navy); font-weight: 600; font-size: 0.88rem; text-decoration: none; border-bottom: 2px solid var(--gold); align-self: flex-start; padding-bottom: 2px; }
    .empty { text-align: center; padding: 60px 20px; color: #94A3B8; grid-column: 1/-1; }
    footer { background: var(--navy); color: #94A3B8; text-align: center; padding: 30px; font-size: 0.85rem; }
</style>
</head>
<body>

<header>
    <div class="container nav-container">
        <a href="index.html" class="logo">Av. Emre <span>Altundaş</span></a>
        <a href="index.html" class="back">&larr; Anasayfaya Dön</a>
    </div>
</header>

<div class="page-head">
    <h1>Makaleler</h1>
    <div class="gold-line"></div>
    <p>Güncel mevzuat ve hukuki gelişmeler üzerine değerlendirmelerimiz.</p>
</div>

<div class="container">
    <div class="grid" id="articleGrid">
        <p class="empty">Makaleler yükleniyor...</p>
    </div>
</div>

<footer>&copy; 2026 Av. Emre Altundaş Hukuk Bürosu. Tüm hakları saklıdır.</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
    async function loadArticles() {
        const grid = document.getElementById('articleGrid');
        const { data, error } = await supabaseClient
            .from('articles')
            .select('*')
            .eq('published', true)
            .order('created_at', { ascending: false });

        if (error) {
            grid.innerHTML = `<p class="empty">Makaleler yüklenirken bir sorun oluştu. Lütfen daha sonra tekrar deneyin.</p>`;
            console.error(error);
            return;
        }

        if (!data || data.length === 0) {
            grid.innerHTML = `<p class="empty">Henüz yayınlanmış makale bulunmuyor.</p>`;
            return;
        }

        grid.innerHTML = data.map(article => {
            const date = new Date(article.created_at).toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
            const img = article.image_url
                ? `<img src="${escapeHtml(article.image_url)}" alt="${escapeHtml(article.title)}">`
                : `<div style="width:100%;height:190px;background:linear-gradient(135deg,#0F2747,#1a3a63);"></div>`;
            return `
                <div class="card">
                    ${img}
                    <div class="card-body">
                        <div class="card-date">${date}</div>
                        <h3>${escapeHtml(article.title)}</h3>
                        <p>${escapeHtml(article.summary || '')}</p>
                        <a class="read" href="makale.html?id=${article.id}">Devamını Oku &rarr;</a>
                    </div>
                </div>`;
        }).join('');
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    loadArticles();
</script>
</body>
</html>
